# URL para la base de datos en producción DESCOMENTAR ESTO PARA FORMAR EL DOCKER
spring.r2dbc.url=${DB_URL}
spring.r2dbc.username=${DB_USER}
spring.r2dbc.password=${DB_PASS}

# Pool de Conexiones #

spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=3m
spring.r2dbc.pool.background-eviction-interval=1m
spring.r2dbc.pool.validation-query=SELECT 1

# Conexión con el S3 #

aws.region=us-east-1
aws.s3.bucket=bomboplats-imagestorage
aws.access_key_id=${AWS_ACCESS_KEY_ID}
aws.secret_access_key=${AWS_SECRET_ACCESS_KEY}
aws.session_token=${AWS_SESSION_TOKEN}

# Tiempo máximo de una conexión HTTP inactiva
server.netty.idle-timeout=2s

# Tiempo máximo que una conexión keep-alive puede mantenerse abierta
server.netty.connection-timeout=30s

server.error.include-stacktrace=always
server.error.include-message=always
spring.webflux.problemdetails.enabled=true

